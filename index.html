<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="caixa-login">
            <h2>Login</h2>
            <!--Conectando com o login.php-->
            <form id="login-form" action="login.php" method="post">
                <div class="input">
                    <!--name="usuario" -> nome da coluna na tabela usuarios-->
                    <input type="text" id="username" name="usuario" required>
                    <label>Usuário</label>
                </div>
                <div class="input">
                    <!--name="senha" -> nome da coluna na tabela usuarios-->
                    <input type="password" id="password" name="senha" required>
                    <label>Senha</label>
                </div>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
