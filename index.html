<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--VM- Container-->
    <!--VM- O container vai centralizar a caixa de login, tem borda e espaçamento entre os itens-->
    <div class="container">
        <!--VM- Caixa de login-->
        <!--VM- Aqui, fiz uma caixa de login simples, com campos para um usuário e uma senha em formulário com um botão pra "entrar"-->
        <div class="caixa-login">
            <h2>Login</h2>
            <form>
                <div class="input">
                    <input type="text" required>
                    <label>Usuário</label>
                </div>
                <div class="input">
                    <input type="password" required>
                    <label>Senha</label>
                </div>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
