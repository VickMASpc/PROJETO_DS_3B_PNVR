<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <p>Projeto desenvolvimento de sistemas 3°B</p>
        <p>Tela de login</p>
        <p>Integrantes: Victor Monteiro, Rodrigo Raimundo, Phelipe Eduardo, Nicollas Cavalcanti, Roberto Junior</p>
        <p>2026</p>
    </header>

    <div class="container">
        <div class="caixa-login">
            <h2>Login</h2>
            <!--VM- Conectando com o login.php-->
            <form id="login-form" action="login.php" method="post">
                <div class="input">
                    <!--VM- name="usuario" -> nome da coluna na tabela usuarios-->
                    <input type="text" id="username" name="usuario" required>
                    <label>Usuário</label>
                </div>
                <div class="input">
                    <!--VM- name="senha" -> nome da coluna na tabela usuarios-->
                    <input type="password" id="password" name="senha" required>
                    <label>Senha</label>
                </div>
                <button type="submit" class="btn-logar">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
